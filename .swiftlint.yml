included:
  - Boardly
  - Sources/BoardlyKit
  - Tests

excluded:
  - .build
  - DerivedData
  - Reference

# NOTE: SwiftLint is a *local* aid only (run via the .claude post-edit hook when
# installed); CI enforces style through `swiftformat --lint`. Import ordering is
# owned by SwiftFormat (--importgrouping testable-bottom) — do not re-add
# sorted_imports here or the two tools will fight and CI will reject the result.
opt_in_rules:
  - empty_count
  - explicit_init
  - closure_spacing
  - redundant_type_annotation

disabled_rules:
  - todo

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - i
    - j

type_name:
  min_length: 3

force_cast: warning
force_try: warning
force_unwrapping: warning
