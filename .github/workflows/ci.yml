name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege by default; each job re-declares what it needs.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: Boardly/Boardly.xcodeproj
  SCHEME: Boardly

jobs:
  # Job ids (build / test / lint) are the status-check contexts required by the
  # `protect-main` ruleset — keep them in sync if you rename a job.
  build:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable
      # Generic destination: builds against the iOS Simulator SDK without needing
      # a specific booted runtime (min deployment target is iOS 18.4).
      - name: Build app (iOS Simulator)
        run: xcodebuild -project "$PROJECT" -scheme "$SCHEME" -destination 'generic/platform=iOS Simulator' build

  test:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable
      # BoardlyKit's SwiftPM tests run on the host (not part of the app scheme).
      - name: BoardlyKit unit tests
        run: swift test
      # App-target tests on a simulator (UI tests are excluded).
      - name: App unit tests (iOS Simulator)
        run: xcodebuild -project "$PROJECT" -scheme "$SCHEME" -destination 'platform=iOS Simulator,name=iPhone 16' -only-testing:BoardlyTests test

  lint:
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      # Pinned to the exact version the repo is formatted with (see .swiftformat),
      # so CI never flags drift from a newer default rule set.
      - name: Install SwiftFormat 0.61.1
        run: |
          curl -fsSL -o swiftformat.zip \
            https://github.com/nicklockwood/SwiftFormat/releases/download/0.61.1/swiftformat.zip
          unzip -o -q swiftformat.zip
          chmod +x swiftformat
      - name: SwiftFormat (lint only)
        run: ./swiftformat --lint .
